on:
  workflow_call:
    inputs:
      specs_path:
        required: true
        type: string
      runtime_mapping_path:
        required: true
        type: string
      suite_timeout_seconds:
        required: false
        type: number
      comment_on_pr:
        required: false
        type: boolean
    secrets:
      CONTRACTGUARD_BEARER_TOKEN:
        required: false
      CONTRACTGUARD_API_KEY:
        required: false
      CONTRACTGUARD_API_KEY_HEADER:
        required: false
      CONTRACTGUARD_AUTH_BY_BASE_URL_JSON:
        required: false
